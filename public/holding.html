<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESCO - Coming Soon</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #04203e;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Courier New', monospace;
  }

  /* Starfield background */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
    opacity: 0;
  }

  @keyframes twinkle {
    0% { opacity: 0; transform: scale(0.5); }
    100% { opacity: var(--max-o, 0.8); transform: scale(1.2); }
  }

  /* Main bouncing logo - DVD screensaver style */
  .bouncer {
    position: fixed;
    z-index: 10;
    animation:
      bounceX 11.3s linear infinite alternate,
      bounceY 7.7s linear infinite alternate;
  }

  .bouncer svg {
    width: 280px;
    height: auto;
    filter: drop-shadow(0 0 20px rgba(190, 155, 72, 0.4));
    animation: spinGlow 6s ease-in-out infinite;
  }

  @keyframes bounceX {
    0% { left: 5%; }
    100% { left: calc(100% - 300px); }
  }

  @keyframes bounceY {
    0% { top: 10%; }
    100% { top: calc(100% - 160px); }
  }

  @keyframes spinGlow {
    0%, 100% {
      filter: drop-shadow(0 0 20px rgba(190, 155, 72, 0.4));
      transform: rotate(0deg) scale(1);
    }
    25% {
      filter: drop-shadow(0 0 40px rgba(190, 155, 72, 0.8));
      transform: rotate(5deg) scale(1.05);
    }
    50% {
      filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.5));
      transform: rotate(0deg) scale(1.1);
    }
    75% {
      filter: drop-shadow(0 0 40px rgba(190, 155, 72, 0.8));
      transform: rotate(-5deg) scale(1.05);
    }
  }

  /* Second bouncer - smaller, different timing */
  .bouncer-2 {
    position: fixed;
    z-index: 8;
    animation:
      bounceX2 9.1s linear infinite alternate,
      bounceY2 13.3s linear infinite alternate;
  }

  .bouncer-2 svg {
    width: 120px;
    height: auto;
    opacity: 0.5;
    animation: spinSlow 20s linear infinite;
  }

  @keyframes bounceX2 {
    0% { left: 60%; }
    100% { left: 10%; }
  }

  @keyframes bounceY2 {
    0% { top: 70%; }
    100% { top: 5%; }
  }

  @keyframes spinSlow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Third bouncer - M icon only */
  .bouncer-3 {
    position: fixed;
    z-index: 7;
    animation:
      bounceX3 15.7s linear infinite alternate,
      bounceY3 8.9s linear infinite alternate;
  }

  .bouncer-3 svg {
    width: 80px;
    height: 80px;
    opacity: 0.35;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes bounceX3 {
    0% { left: 30%; }
    100% { left: calc(100% - 100px); }
  }

  @keyframes bounceY3 {
    0% { top: 80%; }
    100% { top: 3%; }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.35; }
    50% { transform: scale(1.3); opacity: 0.6; }
  }

  /* Diagonal streak lines */
  .streak {
    position: fixed;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(190, 155, 72, 0.3), transparent);
    z-index: 1;
    animation: streak var(--s-dur) linear infinite;
    transform: rotate(25deg);
    opacity: 0;
  }

  @keyframes streak {
    0% { opacity: 0; top: -20%; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { opacity: 0; top: 120%; }
  }

  /* Center text */
  .center-text {
    position: fixed;
    z-index: 20;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: white;
    animation: fadeInOut 4s ease-in-out infinite alternate;
  }

  .center-text h2 {
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #be9b48;
    margin-bottom: 8px;
  }

  .center-text p {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.5;
  }

  @keyframes fadeInOut {
    0% { opacity: 0.4; }
    100% { opacity: 1; }
  }

  /* Floating gold particles */
  .particle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: #be9b48;
    border-radius: 50%;
    z-index: 2;
    opacity: 0;
    animation: floatUp var(--p-dur) ease-in-out infinite;
    animation-delay: var(--p-del);
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    20% { opacity: 0.8; transform: translateY(-30px) scale(1); }
    80% { opacity: 0.6; transform: translateY(-150px) scale(0.8); }
    100% { opacity: 0; transform: translateY(-200px) scale(0); }
  }

  /* Pipe screensaver-style borders */
  .pipe {
    position: fixed;
    z-index: 3;
    background: linear-gradient(90deg, transparent, #be9b48, transparent);
    opacity: 0.15;
  }

  .pipe-h {
    height: 1px;
    animation: pipeH 8s linear infinite;
  }

  .pipe-v {
    width: 1px;
    background: linear-gradient(180deg, transparent, #be9b48, transparent);
    animation: pipeV 10s linear infinite;
  }

  @keyframes pipeH {
    0% { left: -30%; width: 30%; }
    100% { left: 100%; width: 30%; }
  }

  @keyframes pipeV {
    0% { top: -30%; height: 30%; }
    100% { top: 100%; height: 30%; }
  }

  /* Scanline overlay for retro feel */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
  }

  /* Vignette */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 49;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
  }
</style>
</head>

<!-- Generate stars with inline script -->
<script>
(function() {
  var stars = document.getElementById('stars');
  for (var i = 0; i < 120; i++) {
    var star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
    star.style.setProperty('--max-o', (0.3 + Math.random() * 0.7).toFixed(2));
    star.style.animationDelay = (Math.random() * 5) + 's';
    star.style.width = (1 + Math.random() * 2) + 'px';
    star.style.height = star.style.width;
    stars.appendChild(star);
  }
})();
</script>
